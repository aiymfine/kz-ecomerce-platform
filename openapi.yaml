info:
  title: "ShopBuilder API"
  description: "ShopBuilder - Shopify Clone for Local Kazakh Merchants"
  version: "1.0"
  contact: {}
components:
  securitySchemes:
    bearer:
      scheme: "bearer"
      bearerFormat: "JWT"
      type: "http"
  schemas:
    RegisterDto:
      type: "object"
      properties:
        email:
          type: "string"
          example: "merchant@example.com"
          description: "Email address"
        password:
          type: "string"
          example: "TestPassword123!"
          description: "Min 8 chars, uppercase + digit required"
        name:
          type: "string"
          example: "Aibek"
          description: "Full name"
        phone:
          type: "string"
          example: "+7 701 234 5678"
          description: "Phone number"
        businessName:
          type: "string"
          example: "My Shop"
          description: "Business/store name"
      required:
        - "email"
        - "password"
        - "name"
    LoginDto:
      type: "object"
      properties:
        email:
          type: "string"
          example: "merchant@example.com"
        password:
          type: "string"
          example: "TestPassword123!"
      required:
        - "email"
        - "password"
    RefreshTokenDto:
      type: "object"
      properties:
        refreshToken:
          type: "string"
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      required:
        - "refreshToken"