        -         bearer: []
  /stores/{storeId}/webhooks/{id}/events:
    get:
      operationId: "WebhooksController_getWebhookEvents"
      summary: "Get webhook delivery event log"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "limit"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "cursor"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "status"
                  required: false
                  in: "query"
                  schema:
                    enum:
                      - "pending"
                      - "delivering"
                      - "delivered"
                      - "failed"
                      - "dead_letter"
                    type: "string"
      responses:
        200:
          description: "Webhook events"
      tags:
        - "Webhooks"
      security:
        -         bearer: []
