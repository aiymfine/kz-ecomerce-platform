                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Webhook updated"
        404:
          description: "Webhook not found"
      tags:
        - "Webhooks"
      security:
        -         bearer: []
    delete:
      operationId: "WebhooksController_deleteWebhook"
      summary: "Delete webhook"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Webhook deleted"
        404:
          description: "Webhook not found"
      tags:
        - "Webhooks"
      security:
        -         bearer: []
    get:
      operationId: "WebhooksController_getWebhook"
      summary: "Get webhook details"
