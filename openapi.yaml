openapi: "3.0.0"
paths:
  /auth/register:
    post:
      operationId: "AuthController_register"
      summary: "Register a new merchant account"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDto"
      responses:
        201:
          description: "Merchant registered successfully"
        409:
          description: "Email already registered"
        429:
          description: "Too many requests"
      tags:
        - "Authentication"
  /auth/login:
    post:
      operationId: "AuthController_login"
      summary: "Login with email and password"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        200:
          description: "Login successful"
        401:
          description: "Invalid credentials"
        429:
          description: "Too many requests"
      tags:
        - "Authentication"
  /auth/refresh:
    post:
      operationId: "AuthController_refresh"
      summary: "Exchange refresh token for new access token"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenDto"
      responses:
        200:
          description: "Token refreshed successfully"
        401:
          description: "Invalid or revoked refresh token"
      tags:
        - "Authentication"
  /auth/admin/login:
    post:
      operationId: "AuthController_adminLogin"
      summary: "Admin login (platform admin only)"
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        200:
          description: "Admin login successful"
        401:
          description: "Invalid credentials"
      tags:
        - "Authentication"
  /auth/logout:
    post:
      operationId: "AuthController_logout"
      summary: "Logout and revoke refresh token"
      parameters: []
      responses:
        200:
          description: "Logged out successfully"
        401:
          description: "Not authenticated"
      tags:
        - "Authentication"
      security:
        -         bearer: []
  /auth/me:
    get:
      operationId: "AuthController_getMe"
      summary: "Get current user profile"
      parameters: []
      responses:
        200:
          description: "User profile"
        401:
          description: "Not authenticated"
      tags:
        - "Authentication"
      security:
        -         bearer: []
  /admin/merchants:
    get:
      operationId: "AdminController_listMerchants"
      summary: "List all merchants"
      parameters:
        -         name: "limit"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "cursor"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "status"
                  required: false
                  in: "query"
                  schema:
                    enum:
                      - "pending"
                      - "approved"
                      - "rejected"
                      - "suspended"
                    type: "string"
      responses:
        200:
          description: "List of merchants"
        401:
          description: "Not authenticated"
        403:
          description: "Insufficient permissions"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/merchants/{id}:
    get:
      operationId: "AdminController_getMerchant"
      summary: "Get merchant details"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Merchant details"
        404:
          description: "Merchant not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/merchants/{id}/approve:
    post:
      operationId: "AdminController_approveMerchant"
      summary: "Approve merchant and create store"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Merchant approved"
        404:
          description: "Merchant not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/merchants/{id}/reject:
    post:
      operationId: "AdminController_rejectMerchant"
      summary: "Reject merchant application"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Merchant rejected"
        404:
          description: "Merchant not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/merchants/{id}/suspend:
    post:
      operationId: "AdminController_suspendMerchant"
      summary: "Suspend merchant"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Merchant suspended"
        404:
          description: "Merchant not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/merchants/{id}/activate:
    post:
      operationId: "AdminController_activateMerchant"
      summary: "Reactivate suspended merchant"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Merchant activated"
        404:
          description: "Merchant not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/stores:
    get:
      operationId: "AdminController_listStores"
      summary: "List all stores"
      parameters:
        -         name: "limit"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "cursor"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
      responses:
        200:
          description: "List of stores"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/stores/{id}/suspend:
    post:
      operationId: "AdminController_suspendStore"
      summary: "Suspend a specific store"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Store suspended"
        404:
          description: "Store not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/stores/{id}/activate:
    post:
      operationId: "AdminController_activateStore"
      summary: "Activate a suspended store"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Store activated"
        404:
          description: "Store not found"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/analytics:
    get:
      operationId: "AdminController_getAnalytics"
      summary: "Platform-wide analytics"
      parameters: []
      responses:
        200:
          description: "Platform analytics"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /admin/audit-log:
    get:
      operationId: "AdminController_getAuditLog"
      summary: "Platform audit log"
      parameters:
        -         name: "limit"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "cursor"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "level"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "resourceType"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "action"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
      responses:
        200:
          description: "Audit log entries"
      tags:
        - "Admin"
      security:
        -         bearer: []
  /stores:
    get:
      operationId: "StoresController_listStores"
      summary: "List merchant stores"
      parameters: []
      responses:
        200:
          description: "List of stores"
        401:
          description: "Not authenticated"
      tags:
        - "Stores"
      security:
        -         bearer: []
    post:
      operationId: "StoresController_createStore"
      summary: "Create a new store"
      parameters: []
      responses:
        201:
          description: "Store created"
        409:
          description: "Subdomain already taken"
      tags:
        - "Stores"
      security:
        -         bearer: []
  /stores/{id}:
    get:
      operationId: "StoresController_getStore"
      summary: "Get store details"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Store details"
        404:
          description: "Store not found"
      tags:
        - "Stores"
      security:
        -         bearer: []
    patch:
      operationId: "StoresController_updateStore"
      summary: "Update store settings"
      parameters:
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Store updated"
        404:
          description: "Store not found"
      tags:
        - "Stores"
      security:
        -         bearer: []
  /stores/{storeId}/products:
    get:
      operationId: "ProductsController_listProducts"
      summary: "List products in a store"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "sort"
                  required: false
                  in: "query"
                  schema:
                    enum:
                      - "asc"
                      - "desc"
                    type: "string"
        -         name: "limit"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "cursor"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "categoryId"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "search"
                  required: false
                  in: "query"
                  schema:
                    type: "string"
        -         name: "status"
                  required: false
                  in: "query"
                  schema:
                    enum:
                      - "draft"
                      - "active"
                      - "archived"
                    type: "string"
      responses:
        200:
          description: "List of products"
      tags:
        - "Products"
      security:
        -         bearer: []
    post:
      operationId: "ProductsController_createProduct"
      summary: "Create a new product"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        201:
          description: "Product created"
        409:
          description: "Slug already exists"
      tags:
        - "Products"
      security:
        -         bearer: []
  /stores/{storeId}/products/{id}:
    get:
      operationId: "ProductsController_getProduct"
      summary: "Get product details with variants"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Product details"
        404:
          description: "Product not found"
      tags:
        - "Products"
      security:
        -         bearer: []
    patch:
      operationId: "ProductsController_updateProduct"
      summary: "Update product"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Product updated"
        404:
          description: "Product not found"
      tags:
        - "Products"
      security:
        -         bearer: []
    delete:
      operationId: "ProductsController_archiveProduct"
      summary: "Archive product (soft delete)"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Product archived"
        404:
          description: "Product not found"
      tags:
        - "Products"
      security:
        -         bearer: []
  /stores/{storeId}/products/{id}/variants:
    post:
      operationId: "ProductsController_generateVariants"
      summary: "Generate variant matrix from Size×Color×Material"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        201:
          description: "Variants generated"
        400:
          description: "Too many combinations or invalid input"
      tags:
        - "Products"
      security:
        -         bearer: []
  /stores/{storeId}/products/{id}/variants/{variantId}:
    patch:
      operationId: "ProductsController_updateVariant"
      summary: "Update variant price, weight, barcode"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "variantId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Variant updated"
        404:
          description: "Variant not found"
      tags:
        - "Products"
      security:
        -         bearer: []
    delete:
      operationId: "ProductsController_deleteVariant"
      summary: "Delete variant"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "variantId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Variant deleted"
        404:
          description: "Variant not found"
      tags:
        - "Products"
      security:
        -         bearer: []
  /stores/{storeId}/categories:
    get:
      operationId: "CategoriesController_listCategories"
      summary: "List categories (flat or tree)"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "parentId"
                  required: false
                  in: "query"
                  schema:
                    type: "number"
        -         name: "tree"
                  required: false
                  in: "query"
                  schema:
                    type: "boolean"
      responses:
        200:
          description: "List of categories"
      tags:
        - "Categories"
      security:
        -         bearer: []
    post:
      operationId: "CategoriesController_createCategory"
      summary: "Create a category"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        201:
          description: "Category created"
      tags:
        - "Categories"
      security:
        -         bearer: []
  /stores/{storeId}/categories/{id}:
    get:
      operationId: "CategoriesController_getCategory"
      summary: "Get category with children"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Category details"
        404:
          description: "Category not found"
      tags:
        - "Categories"
      security:
        -         bearer: []
    patch:
      operationId: "CategoriesController_updateCategory"
      summary: "Update category"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Category updated"
      tags:
        - "Categories"
      security:
        -         bearer: []
    delete:
      operationId: "CategoriesController_deleteCategory"
      summary: "Delete category (must be empty)"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "id"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Category deleted"
        400:
          description: "Category has subcategories or products"
      tags:
        - "Categories"
      security:
        -         bearer: []
  /stores/{storeId}/webhooks:
    get:
      operationId: "WebhooksController_listWebhooks"
      summary: "List webhooks"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
