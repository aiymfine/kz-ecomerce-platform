                  in: "path"
                  schema:
                    type: "number"
      responses:
        200:
          description: "Staff member removed"
        404:
          description: "Staff member not found"
      tags:
        - "Staff"
      security:
        -         bearer: []
  /stores/{storeId}/warehouses:
    get:
      operationId: "WarehousesController_listWarehouses"
      summary: "List warehouses"
      parameters:
        -         name: "storeId"
