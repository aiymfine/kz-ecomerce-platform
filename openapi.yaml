      tags:
        - "Inventory"
      security:
        -         bearer: []
    patch:
      operationId: "WarehousesController_updateWarehouse"
      summary: "Update warehouse"
      parameters:
        -         name: "storeId"
                  required: true
                  in: "path"
                  schema:
                    type: "number"
        -         name: "warehouseId"
                  required: true
